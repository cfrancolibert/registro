<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #f4f5f7; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #1a1a24; }
  input { font-family: inherit; color-scheme: light; }
  input::placeholder { color: #a2a2ad; }
  ::-webkit-calendar-picker-indicator { opacity: .45; cursor: pointer; }
  @keyframes pop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useMemo } = React;

const KEY = 'intake-log-v1';
const FOOD_COLOR   = 'oklch(0.66 0.17 50)';
const WEIGHT_COLOR = 'oklch(0.55 0.15 252)';
const BODY_COLOR   = 'oklch(0.58 0.13 160)';

const pad      = n => String(n).padStart(2, '0');
const toDateStr = ts => { const d = new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const toTimeStr = ts => { const d = new Date(ts); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const dayKey    = ts => { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); };
const toDMY     = ts => { const d = new Date(ts); return `${pad(d.getDate())}/${pad(d.getMonth()+1)}`; };
const dayLabel  = ts => {
  const k = dayKey(ts), today = dayKey(Date.now());
  if (k === today) return 'Hoy';
  if (k === today - 86400000) return 'Ayer';
  const d = new Date(ts);
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  if (d.getFullYear() !== new Date().getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString('es-ES', opts);
};
const colorFor  = type => type === 'food' ? FOOD_COLOR : type === 'weight' ? WEIGHT_COLOR : BODY_COLOR;
const genId     = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const plural    = (n, s, p) => `${n} ${n === 1 ? s : p}`;
const cutoff    = () => Date.now() - 14 * 86400000;

const loadEntries = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
const loadArch    = () => { try { return localStorage.getItem(KEY+'-archived') === '1'; } catch { return false; } };
const saveEnt     = es => { try { localStorage.setItem(KEY, JSON.stringify(es)); } catch {} };
const saveArch    = v  => { try { localStorage.setItem(KEY+'-archived', v ? '1' : '0'); } catch {} };

function niceTicks(min, max, count) {
  const nn = (r, round) => {
    const exp = Math.floor(Math.log10(r)), frac = r / Math.pow(10, exp);
    const nf = round ? (frac < 1.5 ? 1 : frac < 3 ? 2 : frac < 7 ? 5 : 10)
                     : (frac <= 1 ? 1 : frac <= 2 ? 2 : frac <= 5 ? 5 : 10);
    return nf * Math.pow(10, exp);
  };
  if (min === max) { min -= 1; max += 1; }
  const range = nn(max - min, false);
  const step  = nn(range / Math.max(1, count - 1), true);
  const nMin  = Math.floor(min / step) * step;
  const nMax  = Math.ceil(max / step) * step;
  const ticks = [];
  for (let v = nMin; v <= nMax + step * 0.5; v += step) ticks.push(Math.round(v / step) * step);
  return { nMin, nMax, step, ticks };
}

function buildChartData(metric, title, unit, color, dashed, entries, hover) {
  const W=300, H=252, pL=50, pR=14, pT=24, pB=38;
  const plotW = W-pL-pR, plotH = H-pT-pB;

  const byDay = new Map();
  entries.forEach(e => {
    if (e.type !== metric) return;
    const v = parseFloat(e.value);
    if (isNaN(v)) return;
    const k = dayKey(e.ts);
    if (!byDay.has(k) || e.ts >= byDay.get(k).ts) byDay.set(k, { ts: e.ts, v });
  });

  const days = [...byDay.keys()].sort((a,b) => a-b);
  const vals = days.map(k => byDay.get(k).v);
  const has  = vals.length > 0;

  const dataMin = has ? Math.min(...vals) : 0;
  const dataMax = has ? Math.max(...vals) : 1;
  let sc = niceTicks(dataMin, dataMax, 4);
  if (sc.step < 1 && (dataMax - dataMin) >= 1) {
    const a = Math.floor(dataMin), b = Math.ceil(dataMax), t = [];
    for (let v = a; v <= b + 0.5; v++) t.push(v);
    sc = { nMin: a, nMax: b, step: 1, ticks: t };
  }
  const mn = sc.nMin, mx = sc.nMax;
  const dec   = sc.step < 0.1 ? 2 : sc.step < 1 ? 1 : 0;
  const fmtT  = v => v.toFixed(dec);
  const fmtV  = v => (Math.round(v * 10) / 10).toString();
  const n     = days.length;
  const xFor  = i => n > 1 ? pL + (i/(n-1))*plotW : pL + plotW/2;
  const yFor  = v => pT + (1 - (v-mn)/(mx-mn))*plotH;

  const dots = days.map((k, i) => {
    const y = yFor(byDay.get(k).v);
    return { x: xFor(i), y, labelY: y-9, label: fmtV(byDay.get(k).v), date: toDMY(k), dk: k, idx: i };
  });

  let tip = null;
  if (hover && hover.chart === metric && dots[hover.idx]) {
    const d = dots[hover.idx];
    const below = (d.y / H) < 0.18;
    tip = { text: `${d.label} ${unit} · ${d.date}`, dotX: d.x, dotY: d.y, below, left: `${d.x/W*100}%`, top: `${d.y/H*100}%` };
  }

  const grid    = sc.ticks.map(v => ({ y: yFor(v), ty: yFor(v)+5, label: has ? fmtT(v) : '' }));
  const xLabels = days.map((k,i) => ({ x: xFor(i), text: toDMY(k), key: String(k) }));
  const points  = dots.map(d => `${d.x},${d.y}`).join(' ');
  const lgBg    = dashed ? `repeating-linear-gradient(90deg,${color} 0 5px,transparent 5px 9px)` : color;

  return { W, H, pL, axisX0:pL, axisX1:W-pR, axisY:pT+plotH, tickY:pT+plotH+5, labelY:pT+plotH+22,
           has, empty:!has, color, dashed, title, unit, metric,
           grid, xLabels, points, dots, tip, hasTip:!!tip, lgBg };
}

function Chart({ metric, title, unit, color, dashed, entries, hover, setHover }) {
  const c = buildChartData(metric, title, unit, color, dashed, entries, hover);
  return (
    <div style={{ flex:1, minWidth:240, background:'#fff', border:'1px solid #e7e8ee', borderRadius:18, boxShadow:'0 4px 20px rgba(25,25,50,0.05)', padding:'18px 14px 12px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:7, margin:'0 4px 8px' }}>
        <span style={{ width:18, height:3, borderRadius:2, flex:'none', background:c.lgBg }}></span>
        <span style={{ fontSize:14, fontWeight:700, letterSpacing:'-0.01em', color:'#1a1a24' }}>{title}</span>
        <span style={{ fontSize:12, fontWeight:600, color:'#8a8a96' }}>{unit}</span>
      </div>
      {c.has ? (
        <div style={{ position:'relative' }}>
          <svg width="100%" viewBox={`0 0 ${c.W} ${c.H}`} style={{ display:'block', overflow:'visible' }}>
            {c.grid.map((gl, i) => (
              <g key={i}>
                <line x1={c.axisX0} y1={gl.y} x2={c.axisX1} y2={gl.y} stroke="#eceef2" strokeWidth="1"/>
                <text x="42" y={gl.ty} textAnchor="end" fontSize="16" fontWeight="700" fill="#1a1a24" fontFamily="Plus Jakarta Sans">{gl.label}</text>
              </g>
            ))}
            <line x1={c.axisX0} y1={c.axisY} x2={c.axisX1} y2={c.axisY} stroke="#cdced6" strokeWidth="1.5"/>
            <polyline points={c.points} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" strokeDasharray={dashed ? '5 4' : undefined}/>
            {c.dots.map((d,i) => (
              <g key={i}>
                <circle cx={d.x} cy={d.y} r="3.5" fill="#fff" stroke={color} strokeWidth="2"/>
                <text x={d.x} y={d.labelY} textAnchor="middle" fontSize="11" fontWeight="700" fill={color} fontFamily="Plus Jakarta Sans">{d.label}</text>
              </g>
            ))}
            {c.xLabels.map(xl => (
              <g key={xl.key}>
                <line x1={xl.x} y1={c.axisY} x2={xl.x} y2={c.tickY} stroke="#cdced6" strokeWidth="1.5"/>
                <text x={xl.x} y={c.labelY} textAnchor="middle" fontSize="15" fontWeight="700" fill="#1a1a24" fontFamily="Plus Jakarta Sans">{xl.text}</text>
              </g>
            ))}
            {c.hasTip && <circle cx={c.tip.dotX} cy={c.tip.dotY} r="5.5" fill={color} stroke="#fff" strokeWidth="2"/>}
            {c.dots.map((d,i) => (
              <circle key={`h${i}`} cx={d.x} cy={d.y} r="12" fill="transparent" style={{ cursor:'pointer' }}
                onMouseEnter={() => setHover({ chart:metric, idx:d.idx, dayKey:d.dk })}
                onMouseLeave={() => setHover(p => p && p.chart===metric && p.idx===d.idx ? null : p)}
              />
            ))}
          </svg>
          {c.hasTip && (
            <div style={{ position:'absolute', left:c.tip.left, top:c.tip.top,
              transform: c.tip.below ? 'translate(-50%,12px)' : 'translate(-50%,calc(-100% - 12px))',
              background:'#1a1a24', color:'#fff', padding:'5px 9px', borderRadius:8,
              fontSize:12, fontWeight:700, whiteSpace:'nowrap', pointerEvents:'none',
              boxShadow:'0 4px 14px rgba(0,0,0,0.22)', zIndex:5 }}>
              {c.tip.text}
            </div>
          )}
        </div>
      ) : (
        <div style={{ textAlign:'center', color:'#9a9aa6', fontSize:13, padding:'48px 12px', lineHeight:1.6 }}>
          Sin mediciones de {title} aún.
        </div>
      )}
    </div>
  );
}

function EntryRow({ e, isLast, onValue, onNote, onDate, onTime, onDelete }) {
  const [delHov, setDelHov] = useState(false);
  const isText = e.type === 'food';
  const unit   = e.type === 'weight' ? 'kg' : e.type === 'circ' ? 'cm' : '';
  return (
    <div style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'13px 16px', borderBottom: isLast ? 'none' : '1px solid #f0f0f4' }}>
      <span style={{ width:8, height:8, borderRadius:'50%', flex:'none', marginTop:9, background:colorFor(e.type) }}></span>
      <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:1 }}>
        {isText ? (<>
          <input value={e.value} onChange={ev => onValue(ev.target.value)}
            style={{ border:'none', outline:'none', background:'transparent', fontSize:16, fontWeight:500, width:'100%', color:'#1a1a24', padding:'2px 0' }}/>
          <input value={e.note || ''} onChange={ev => onNote(ev.target.value)} placeholder="Agregar nota…"
            style={{ border:'none', outline:'none', background:'transparent', fontSize:13, fontWeight:400, width:'100%', color:'#7a7a86', padding:'1px 0' }}/>
        </>) : (
          <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
            <input value={e.value} onChange={ev => onValue(ev.target.value)} type="number" step="0.1" inputMode="decimal"
              style={{ border:'none', outline:'none', background:'transparent', fontSize:16, fontWeight:600, width:72, color:'#1a1a24', fontVariantNumeric:'tabular-nums', padding:'2px 0' }}/>
            <span style={{ fontSize:14, color:'#8a8a96', fontWeight:500 }}>{unit}</span>
          </div>
        )}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:2, flex:'none' }}>
        <input value={toDateStr(e.ts)} onChange={ev => onDate(ev.target.value)} type="date"
          style={{ border:'none', outline:'none', background:'transparent', fontSize:13, color:'#8a8a96', fontVariantNumeric:'tabular-nums', cursor:'pointer', width:118 }}/>
        <input value={toTimeStr(e.ts)} onChange={ev => onTime(ev.target.value)} type="time"
          style={{ border:'none', outline:'none', background:'transparent', fontSize:13, color:'#8a8a96', fontVariantNumeric:'tabular-nums', cursor:'pointer', width:60 }}/>
        <button onClick={onDelete} onMouseEnter={() => setDelHov(true)} onMouseLeave={() => setDelHov(false)}
          style={{ border:'none', background: delHov ? '#fdecec' : 'transparent', color: delHov ? '#e5484d' : '#c2c2cc', cursor:'pointer', fontSize:16, lineHeight:1, padding:'4px 6px', borderRadius:6, flex:'none' }}>×</button>
      </div>
    </div>
  );
}

function App() {
  const [entries,  setEntries]  = useState(loadEntries);
  const [food,     setFood]     = useState('');
  const [quickType, setQT]      = useState(null);
  const [quickVal,  setQV]      = useState('');
  const [filter,   setFilter]   = useState('all');
  const [view,     setView]     = useState('log');
  const [hover,    setHover]    = useState(null);
  const [archived, setArchived] = useState(loadArch);
  const foodRef = useRef(null);

  const commit = es => { saveEnt(es); setEntries(es); };

  const toggleArchive = () => setArchived(a => { saveArch(!a); return !a; });

  const visible = archived
    ? entries.filter(e => e.ts >= cutoff())
    : entries;

  const oldCount = entries.filter(e => e.ts < cutoff()).length;

  const addEntry = (type, value) => {
    const v = String(value).trim();
    if (!v) return;
    commit([{ id:genId(), type, value:v, ts:Date.now() }, ...entries]);
  };

  const updateEntry = (id, fn) => commit(entries.map(e => e.id === id ? fn(e) : e));
  const removeEntry = id => commit(entries.filter(e => e.id !== id));

  const doFood = () => {
    if (!food.trim()) return;
    addEntry('food', food);
    setFood('');
    requestAnimationFrame(() => foodRef.current?.focus());
  };

  const doQuick = () => {
    if (!quickVal.trim()) { setQT(null); return; }
    addEntry(quickType, quickVal);
    setQT(null); setQV('');
    requestAnimationFrame(() => foodRef.current?.focus());
  };

  const showReport = view === 'report';

  const filtered = visible
    .filter(e => filter === 'all' || e.type === filter)
    .sort((a,b) => b.ts - a.ts);

  // Group by day
  const groupMap = new Map();
  filtered.forEach(e => { const k = dayKey(e.ts); if (!groupMap.has(k)) groupMap.set(k,[]); groupMap.get(k).push(e); });
  const groups = [...groupMap.entries()].sort((a,b) => b[0]-a[0]).map(([k,es]) => ({
    key: String(k), label: dayLabel(es[0].ts), sub: plural(es.length,'registro','registros'), entries: es
  }));

  // Report food days
  const foodMap = new Map();
  visible.filter(e => e.type==='food').forEach(e => { const k=dayKey(e.ts); if(!foodMap.has(k)) foodMap.set(k,[]); foodMap.get(k).push(e); });
  const hlKey   = hover?.dayKey ?? null;
  const hlColor = hover ? colorFor(hover.chart) : null;
  const foodDays = [...foodMap.keys()].sort((a,b)=>b-a).map(k => {
    const hl = hlKey === k;
    return { key:String(k), label:dayLabel(k), hl, hlColor: hl ? hlColor : null, items: foodMap.get(k).sort((a,b)=>a.ts-b.ts) };
  });

  const qIsW = quickType === 'weight';

  const fBtn = (key, label) => {
    const active = filter === key;
    return (
      <button key={key} onClick={() => setFilter(key)} style={{
        border:`1px solid ${active ? '#1a1a24' : '#dcdce3'}`,
        background: active ? '#1a1a24' : '#fff',
        color: active ? '#fff' : '#6c6c79',
        fontFamily:'inherit', fontSize:13, fontWeight:600,
        padding:'6px 13px', borderRadius:999, cursor:'pointer'
      }}>{label}</button>
    );
  };

  return (
    <div style={{ minHeight:'100vh', width:'100%', background:'radial-gradient(120% 80% at 50% -10%,#eef0f5 0%,#f4f5f7 60%)', padding:'34px 20px 120px', display:'flex', justifyContent:'center' }}>
      <div style={{ width:'100%', maxWidth:600 }}>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', margin:'0 4px 20px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:9 }}>
            <span style={{ width:14, height:14, borderRadius:4, background:'linear-gradient(135deg,oklch(0.66 0.17 50),oklch(0.55 0.15 252))', display:'inline-block' }}></span>
            <div style={{ fontSize:20, fontWeight:800, letterSpacing:'-0.03em' }}>Registro</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            {!showReport && <span style={{ fontSize:13, color:'#8a8a96', fontVariantNumeric:'tabular-nums' }}>{plural(visible.length,'registro','registros')}</span>}
            <button onClick={() => setView(v => v==='report' ? 'log' : 'report')} style={{
              border:`1px solid ${showReport ? '#1a1a24' : '#dcdce3'}`,
              background: showReport ? '#1a1a24' : '#fff',
              color: showReport ? '#fff' : '#4a4a57',
              fontFamily:'inherit', fontSize:13, fontWeight:600, padding:'6px 14px', borderRadius:999, cursor:'pointer'
            }}>{showReport ? '← Registro' : 'Reporte'}</button>
          </div>
        </div>

        {/* ── LOG VIEW ── */}
        {!showReport && <>
          {/* Input card */}
          <div style={{ background:'#fff', border:'1px solid #e7e8ee', borderRadius:18, boxShadow:'0 4px 20px rgba(25,25,50,0.05)', padding:'20px 22px', marginBottom:22 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ width:9, height:9, borderRadius:'50%', flex:'none', background:FOOD_COLOR }}></span>
              <input ref={foodRef} value={food} onChange={e => setFood(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter') { e.preventDefault(); doFood(); } }}
                placeholder="¿Qué comiste?" autoFocus
                style={{ border:'none', outline:'none', background:'transparent', fontSize:22, fontWeight:500, letterSpacing:'-0.02em', width:'100%', color:'#1a1a24', padding:'4px 0' }}/>
              <button onClick={doFood} style={{ border:'none', background:'#1a1a24', color:'#fff', width:36, height:36, borderRadius:11, flex:'none', cursor:'pointer', fontSize:16, lineHeight:1, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>↵</button>
            </div>

            <div style={{ display:'flex', gap:8, marginTop:16 }}>
              <button onClick={() => { setQT(t => t==='weight' ? null : 'weight'); setQV(''); }}
                style={{ border:'1px solid #dcdce3', background:'#fff', color:'#4a4a57', fontFamily:'inherit', fontSize:14, fontWeight:600, padding:'8px 14px', borderRadius:11, cursor:'pointer' }}>＋ Peso</button>
              <button onClick={() => { setQT(t => t==='circ' ? null : 'circ'); setQV(''); }}
                style={{ border:'1px solid #dcdce3', background:'#fff', color:'#4a4a57', fontFamily:'inherit', fontSize:14, fontWeight:600, padding:'8px 14px', borderRadius:11, cursor:'pointer' }}>＋ Contorno</button>
            </div>

            {quickType && (
              <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:14, paddingTop:14, borderTop:'1px solid #eceef2', animation:'pop .18s ease' }}>
                <span style={{ width:9, height:9, borderRadius:'50%', flex:'none', background:colorFor(quickType) }}></span>
                <input key={quickType} value={quickVal} onChange={e => setQV(e.target.value)}
                  onKeyDown={e => {
                    if (e.key==='Enter') { e.preventDefault(); doQuick(); }
                    if (e.key==='Escape') { setQT(null); setQV(''); }
                  }}
                  type="number" step="0.1" inputMode="decimal"
                  placeholder={qIsW ? 'Peso en kg' : 'Contorno en cm'}
                  autoFocus
                  style={{ border:'none', outline:'none', background:'transparent', fontSize:22, fontWeight:600, width:'100%', color:'#1a1a24', fontVariantNumeric:'tabular-nums', padding:'4px 0' }}/>
                <span style={{ fontSize:15, color:'#8a8a96', fontWeight:500, flex:'none' }}>{qIsW ? 'kg' : 'cm'}</span>
                <button onClick={doQuick} style={{ border:'none', background:'#1a1a24', color:'#fff', width:36, height:36, borderRadius:11, flex:'none', cursor:'pointer', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>↵</button>
              </div>
            )}
          </div>

          {/* Filters */}
          <div style={{ display:'flex', alignItems:'center', gap:7, margin:'0 4px 14px', flexWrap:'wrap' }}>
            {fBtn('all','Todo')}
            {fBtn('food','Comida')}
            {fBtn('weight','Peso')}
            {fBtn('circ','Contorno')}
            {oldCount > 0 && (
              <button onClick={toggleArchive} style={{
                display:'inline-flex', alignItems:'center', gap:6, marginLeft:'auto',
                border:`1px solid ${archived ? '#1a1a24' : '#dcdce3'}`,
                background: archived ? '#1a1a24' : '#fff',
                color: archived ? '#fff' : '#6c6c79',
                fontFamily:'inherit', fontSize:13, fontWeight:600, padding:'6px 13px', borderRadius:999, cursor:'pointer'
              }}>{archived ? `Mostrar ${oldCount} archivados` : `Archivar ${oldCount} antiguos`}</button>
            )}
          </div>

          {/* Empty */}
          {filtered.length === 0 && (
            <div style={{ textAlign:'center', color:'#9a9aa6', fontSize:15, padding:'48px 0', lineHeight:1.6 }}>
              Nada registrado aún.<br/>Escribe qué comiste y presiona enter.
            </div>
          )}

          {/* Groups */}
          {groups.map(g => (
            <div key={g.key} style={{ marginBottom:8 }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:8, margin:'18px 4px 6px' }}>
                <span style={{ fontSize:13, fontWeight:700, letterSpacing:'-0.01em', color:'#6c6c79', textTransform:'capitalize' }}>{g.label}</span>
                <span style={{ fontSize:12, color:'#a2a2ad', fontVariantNumeric:'tabular-nums' }}>{g.sub}</span>
              </div>
              <div style={{ background:'#fff', border:'1px solid #e7e8ee', borderRadius:14, overflow:'hidden', boxShadow:'0 2px 12px rgba(25,25,50,0.04)' }}>
                {g.entries.map((e, i) => (
                  <EntryRow key={e.id} e={e} isLast={i === g.entries.length-1}
                    onValue={v => updateEntry(e.id, en => ({ ...en, value:v }))}
                    onNote={v  => updateEntry(e.id, en => ({ ...en, note:v }))}
                    onDate={v  => { if (!v) return; const [Y,M,D] = v.split('-').map(Number); updateEntry(e.id, en => { const d=new Date(en.ts); d.setFullYear(Y,M-1,D); return {...en,ts:d.getTime()}; }); }}
                    onTime={v  => { if (!v) return; const [h,m] = v.split(':').map(Number); updateEntry(e.id, en => { const d=new Date(en.ts); d.setHours(h,m,0,0); return {...en,ts:d.getTime()}; }); }}
                    onDelete={() => removeEntry(e.id)}
                  />
                ))}
              </div>
            </div>
          ))}
        </>}

        {/* ── REPORT VIEW ── */}
        {showReport && <>
          <div style={{ display:'flex', gap:14, marginBottom:22, flexWrap:'wrap' }}>
            <Chart metric="weight" title="Peso"     unit="kg" color={WEIGHT_COLOR} dashed={false} entries={visible} hover={hover} setHover={setHover}/>
            <Chart metric="circ"   title="Contorno" unit="cm" color={BODY_COLOR}   dashed={true}  entries={visible} hover={hover} setHover={setHover}/>
          </div>

          {foodDays.map(fd => (
            <div key={fd.key} style={{ marginBottom:8 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, fontWeight:700, margin:'18px 4px 6px', textTransform:'capitalize', color: fd.hl ? fd.hlColor : '#6c6c79', transition:'color .22s ease' }}>
                {fd.hl && <span style={{ width:7, height:7, borderRadius:'50%', flex:'none', background: fd.hlColor || '#999' }}></span>}
                <span>{fd.label}</span>
              </div>
              <div style={{
                background:'#fff',
                border:`1px solid ${fd.hl ? fd.hlColor : '#e7e8ee'}`,
                borderRadius:14, overflow:'hidden',
                boxShadow: fd.hl ? `inset 3px 0 0 ${fd.hlColor}, 0 10px 26px rgba(25,25,50,0.13)` : '0 2px 12px rgba(25,25,50,0.04)',
                transform: fd.hl ? 'translateY(-2px)' : 'none',
                transition:'transform .22s ease, box-shadow .22s ease, border-color .22s ease',
              }}>
                {fd.items.map((e, i) => (
                  <div key={e.id} style={{ display:'flex', alignItems:'baseline', gap:12, padding:'11px 16px', borderBottom: i < fd.items.length-1 ? '1px solid #f0f0f4' : 'none' }}>
                    <span style={{ fontSize:12, color:'#8a8a96', fontVariantNumeric:'tabular-nums', flex:'none', width:42 }}>{toTimeStr(e.ts)}</span>
                    <div style={{ display:'flex', flexDirection:'column', gap:1, minWidth:0 }}>
                      <span style={{ fontSize:15, fontWeight:500, color:'#1a1a24' }}>{e.value}</span>
                      {e.note && e.note.trim() && <span style={{ fontSize:12.5, fontWeight:400, color:'#8a8a96' }}>{e.note}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
